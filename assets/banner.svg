<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#22d3ee" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)" />
  <rect width="1200" height="400" rx="16" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)" rx="16" />

  <!-- Owl eyes (simplified) -->
  <circle cx="130" cy="170" r="55" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <circle cx="130" cy="170" r="35" fill="#22d3ee" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="137" cy="167" r="16" fill="#0f172a"/>
  <circle cx="145" cy="158" r="6" fill="white" opacity="0.7"/>

  <circle cx="260" cy="170" r="55" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <circle cx="260" cy="170" r="35" fill="#22d3ee" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="267" cy="167" r="16" fill="#0f172a"/>
  <circle cx="275" cy="158" r="6" fill="white" opacity="0.7"/>

  <!-- Beak -->
  <polygon points="195,210 183,240 207,240" fill="#f59e0b"/>

  <!-- Title -->
  <text x="380" y="170" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="80" font-weight="800" fill="white" letter-spacing="-2">NightOwl</text>

  <!-- Subtitle -->
  <text x="383" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" fill="#22d3ee" filter="url(#glow2)">Advanced Penetration Testing Framework</text>

  <!-- Stats bar -->
  <rect x="380" y="250" width="90" height="32" rx="6" fill="#22d3ee" opacity="0.15"/>
  <text x="394" y="272" font-family="'SF Mono', monospace" font-size="14" font-weight="700" fill="#22d3ee">57 modules</text>

  <rect x="485" y="250" width="70" height="32" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="496" y="272" font-family="'SF Mono', monospace" font-size="14" font-weight="700" fill="#f59e0b">full auto</text>

  <rect x="570" y="250" width="90" height="32" rx="6" fill="#10b981" opacity="0.15"/>
  <text x="579" y="272" font-family="'SF Mono', monospace" font-size="14" font-weight="700" fill="#10b981">open source</text>

  <rect x="675" y="250" width="105" height="32" rx="6" fill="#a855f7" opacity="0.15"/>
  <text x="684" y="272" font-family="'SF Mono', monospace" font-size="14" font-weight="700" fill="#a855f7">OWASP Top 10</text>

  <!-- Terminal preview -->
  <rect x="380" y="305" width="760" height="70" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="398" cy="320" r="5" fill="#ef4444"/>
  <circle cx="414" cy="320" r="5" fill="#f59e0b"/>
  <circle cx="430" cy="320" r="5" fill="#22c55e"/>
  <text x="400" y="352" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#64748b">$</text>
  <text x="415" y="352" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#22d3ee">nightowl full</text>
  <text x="550" y="352" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="white">https://target.com</text>
  <text x="735" y="352" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#64748b">--mode auto</text>
  <text x="400" y="368" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#22c55e">&#x2713; 57 modules loaded | Scanning...</text>

  <!-- Decorative binary -->
  <text x="30" y="390" font-family="monospace" font-size="9" fill="#22d3ee" opacity="0.1">01001110 01101001 01100111 01101000 01110100 01001111 01110111 01101100</text>
</svg>
