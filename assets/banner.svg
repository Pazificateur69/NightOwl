<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Pure black bg -->
  <rect width="1200" height="340" rx="12" fill="url(#bg)"/>

  <!-- Red scan lines -->
  <g opacity="0.035">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#ff0030"/><line x1="0" y1="80" x2="1200" y2="80" stroke="#ff0030"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#ff0030"/><line x1="0" y1="160" x2="1200" y2="160" stroke="#ff0030"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#ff0030"/><line x1="0" y1="240" x2="1200" y2="240" stroke="#ff0030"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#ff0030"/><line x1="0" y1="320" x2="1200" y2="320" stroke="#ff0030"/>
  </g>

  <!-- Owl - aggressive, both eyes RED -->
  <!-- Horns -->
  <polygon points="100,120 68,42 148,100" fill="#0e0e1a" stroke="#ff0030" stroke-width="1.5" opacity="0.8"/>
  <polygon points="108,115 78,52 142,103" fill="#12121f"/>
  <polygon points="240,120 272,42 192,100" fill="#0e0e1a" stroke="#ff0030" stroke-width="1.5" opacity="0.8"/>
  <polygon points="232,115 262,52 198,103" fill="#12121f"/>

  <!-- Head -->
  <path d="M170,80 L268,128 L278,200 L245,248 L170,262 L95,248 L62,200 L72,128 Z" fill="#0c0c18" stroke="#1a1a30" stroke-width="1"/>
  <path d="M170,95 L255,138 L262,195 L235,238 L170,248 L105,238 L78,195 L85,138 Z" fill="#080812"/>

  <!-- Scar -->
  <path d="M112,108 L140,178" stroke="#ff0030" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- V forehead -->
  <path d="M170,95 L148,130 L170,120 L192,130 Z" fill="#ff0030" opacity="0.2"/>

  <!-- Left eye RED -->
  <path d="M92,148 L142,128 L168,148 L142,172 L92,162 Z" fill="#050508"/>
  <ellipse cx="132" cy="150" rx="30" ry="16" fill="#ff0030" filter="url(#g1)"/>
  <ellipse cx="136" cy="148" rx="13" ry="9" fill="#050508"/>
  <ellipse cx="139" cy="146" rx="5" ry="4" fill="#ff4466"/>
  <ellipse cx="132" cy="150" rx="42" ry="24" fill="none" stroke="#ff0030" stroke-width="1" opacity="0.2"/>

  <!-- Right eye RED -->
  <path d="M248,148 L198,128 L172,148 L198,172 L248,162 Z" fill="#050508"/>
  <ellipse cx="208" cy="150" rx="30" ry="16" fill="#ff0030" filter="url(#g1)"/>
  <ellipse cx="212" cy="148" rx="13" ry="9" fill="#050508"/>
  <ellipse cx="215" cy="146" rx="5" ry="4" fill="#ff4466"/>
  <ellipse cx="208" cy="150" rx="42" ry="24" fill="none" stroke="#ff0030" stroke-width="1" opacity="0.2"/>

  <!-- Heavy angry brows -->
  <line x1="95" y1="130" x2="158" y2="138" stroke="#ff0030" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="245" y1="130" x2="182" y2="138" stroke="#ff0030" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Beak -->
  <polygon points="170,172 160,192 170,200 180,192" fill="#cc4400"/>
  <polygon points="170,175 163,189 170,195 177,189" fill="#e65500"/>

  <!-- Blood drip -->
  <path d="M135,168 Q133,185 136,200" stroke="#ff0030" stroke-width="1.5" fill="none" opacity="0.12" stroke-linecap="round"/>

  <!-- Title -->
  <text x="340" y="148" font-family="'SF Pro Display','Inter','Segoe UI',Arial,sans-serif" font-size="92" font-weight="900" fill="white" letter-spacing="-3">NightOwl</text>

  <!-- Subtitle -->
  <text x="345" y="190" font-family="'SF Mono','Fira Code',monospace" font-size="20" fill="#ff0030" filter="url(#g2)" letter-spacing="1.5">PENETRATION TESTING FRAMEWORK</text>

  <!-- Stats pills - all red theme -->
  <rect x="345" y="212" width="100" height="30" rx="6" fill="#ff0030" opacity="0.12"/>
  <text x="358" y="232" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#ff0030">72 modules</text>

  <rect x="460" y="212" width="80" height="30" rx="6" fill="#ff0030" opacity="0.12"/>
  <text x="472" y="232" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#ff4455">full auto</text>

  <rect x="555" y="212" width="100" height="30" rx="6" fill="#ff6600" opacity="0.12"/>
  <text x="564" y="232" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#ff6600">open source</text>

  <rect x="670" y="212" width="110" height="30" rx="6" fill="#ff0030" opacity="0.12"/>
  <text x="679" y="232" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#ff3355">OWASP Top 10</text>

  <!-- Terminal line -->
  <rect x="345" y="262" width="800" height="55" rx="8" fill="#050508" stroke="#1a1a30" stroke-width="1"/>
  <circle cx="362" cy="277" r="4" fill="#ff0030"/>
  <circle cx="376" cy="277" r="4" fill="#ff6600"/>
  <circle cx="390" cy="277" r="4" fill="#444"/>
  <text x="362" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#555">$</text>
  <text x="378" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#ff0030" font-weight="700">nightowl full</text>
  <text x="515" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#888">https://target.com</text>
  <text x="710" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#444">--mode auto</text>

  <!-- Red corner brackets -->
  <path d="M8,8 L8,45 M8,8 L45,8" fill="none" stroke="#ff0030" stroke-width="2.5" opacity="0.2"/>
  <path d="M1192,8 L1192,45 M1192,8 L1155,8" fill="none" stroke="#ff0030" stroke-width="2.5" opacity="0.2"/>
  <path d="M8,332 L8,295 M8,332 L45,332" fill="none" stroke="#ff0030" stroke-width="2.5" opacity="0.2"/>
  <path d="M1192,332 L1192,295 M1192,332 L1155,332" fill="none" stroke="#ff0030" stroke-width="2.5" opacity="0.2"/>
</svg>
