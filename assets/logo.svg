<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlowFilter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#22d3ee" stroke-width="3" opacity="0.95"/>

  <!-- Owl body -->
  <ellipse cx="256" cy="310" rx="120" ry="130" fill="url(#bodyGrad)" />

  <!-- Ear tufts (left) -->
  <polygon points="160,160 140,90 190,140" fill="#475569" />
  <polygon points="165,155 150,100 188,138" fill="#64748b" />

  <!-- Ear tufts (right) -->
  <polygon points="352,160 372,90 322,140" fill="#475569" />
  <polygon points="347,155 362,100 324,138" fill="#64748b" />

  <!-- Head -->
  <ellipse cx="256" cy="210" rx="110" ry="95" fill="#475569" />

  <!-- Face disc (lighter) -->
  <ellipse cx="256" cy="220" rx="95" ry="80" fill="#64748b" />

  <!-- Left eye socket -->
  <circle cx="210" cy="210" r="42" fill="#1e293b" />
  <!-- Right eye socket -->
  <circle cx="302" cy="210" r="42" fill="#1e293b" />

  <!-- Left eye (cyan glow) -->
  <circle cx="210" cy="210" r="30" fill="url(#eyeGlow)" filter="url(#eyeGlowFilter)" />
  <!-- Left pupil -->
  <circle cx="215" cy="208" r="14" fill="#0f172a" />
  <!-- Left eye highlight -->
  <circle cx="222" cy="200" r="6" fill="white" opacity="0.8" />

  <!-- Right eye (cyan glow) -->
  <circle cx="302" cy="210" r="30" fill="url(#eyeGlow)" filter="url(#eyeGlowFilter)" />
  <!-- Right pupil -->
  <circle cx="307" cy="208" r="14" fill="#0f172a" />
  <!-- Right eye highlight -->
  <circle cx="314" cy="200" r="6" fill="white" opacity="0.8" />

  <!-- Beak -->
  <polygon points="256,240 244,265 268,265" fill="#f59e0b" />
  <polygon points="256,242 248,260 264,260" fill="#fbbf24" />

  <!-- Chest pattern (V shapes) -->
  <path d="M220,300 L256,330 L292,300" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
  <path d="M225,315 L256,345 L287,315" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.4"/>
  <path d="M230,330 L256,355 L282,330" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>

  <!-- Wings (left) -->
  <path d="M136,260 Q100,310 130,400 Q150,370 160,340 Q155,310 140,280 Z" fill="#334155" />
  <!-- Wings (right) -->
  <path d="M376,260 Q412,310 382,400 Q362,370 352,340 Q357,310 372,280 Z" fill="#334155" />

  <!-- Feet -->
  <path d="M220,420 L210,445 L225,440 L235,450 L240,435 L250,445 L248,420" fill="#f59e0b" />
  <path d="M264,420 L262,445 L272,435 L277,450 L287,440 L302,445 L292,420" fill="#f59e0b" />

  <!-- Binary code decoration (subtle) -->
  <text x="80" y="470" fill="#22d3ee" opacity="0.15" font-family="monospace" font-size="10">01101001 01101110</text>
  <text x="320" y="470" fill="#22d3ee" opacity="0.15" font-family="monospace" font-size="10">01110011 01100101</text>
  <text x="60" y="60" fill="#22d3ee" opacity="0.1" font-family="monospace" font-size="10">10110100 11001010</text>
  <text x="350" y="60" fill="#22d3ee" opacity="0.1" font-family="monospace" font-size="10">01011001 10100110</text>

  <!-- Scan line effect -->
  <line x1="50" y1="256" x2="462" y2="256" stroke="#22d3ee" stroke-width="1" opacity="0.1" />
</svg>
