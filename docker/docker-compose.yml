version: "3.8"

services:
  nightowl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../configs:/app/configs
      - ../reports:/app/reports
      - ../wordlists:/app/wordlists
    environment:
      - NIGHTOWL_LOG_LEVEL=INFO

  # Optional test targets for practice
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8081:80"
    profiles:
      - targets

  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "8082:3000"
    profiles:
      - targets
